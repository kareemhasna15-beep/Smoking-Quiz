<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smoking Test</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f4f6fb;
  margin: 0;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 560px;
  padding: 20px;
}

.main-title {
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  color: #1f2a44;
  margin: 10px 0 24px;
}

.screen {
  background: white;
  padding: 28px;
  border-radius: 22px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.start-screen h2,
.question-card h3,
.result-box h2 {
  margin-top: 0;
  color: #1f2a44;
}

.start-text {
  color: #555;
  line-height: 1.6;
  margin-bottom: 22px;
}

.legend {
  display: grid;
  gap: 14px;
  margin-bottom: 26px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #f8f9fc;
  padding: 12px 14px;
  border-radius: 14px;
}

.legend-circle {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  flex-shrink: 0;
}

.legend-item span {
  color: #333;
  font-size: 15px;
}

.header {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  margin-bottom: 10px;
}

.progress-bar {
  height: 8px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 25px;
}

.progress {
  height: 100%;
  background: #4CAF50;
  width: 0%;
  transition: 0.3s;
}

.question-card {
  text-align: center;
}

.answers {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  margin-top: 25px;
}

.circle {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid transparent;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.circle:nth-child(1),
.legend-circle.sd { background: #ff6b6b; }

.circle:nth-child(2),
.legend-circle.d { background: #ffa94d; }

.circle:nth-child(3),
.legend-circle.n { background: #ced4da; }

.circle:nth-child(4),
.legend-circle.a { background: #69db7c; }

.circle:nth-child(5),
.legend-circle.sa { background: #38d9a9; }

.circle:hover {
  transform: scale(1.15);
  box-shadow: 0 6px 14px rgba(0,0,0,0.12);
}

.labels {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-top: 8px;
  color: #555;
}

#result {
  text-align: center;
  margin-top: 40px;
}

.result-text {
  font-size: 26px;
  font-weight: bold;
}

button {
  margin-top: 20px;
  padding: 13px 22px;
  border: none;
  border-radius: 12px;
  background: #4CAF50;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.2s ease;
}

button:hover {
  background: #45a049;
  transform: translateY(-1px);
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">
  <!-- FIXED TITLE -->
  <div class="main-title">Smoking Quiz</div>

  <div id="startScreen" class="screen start-screen">
    <h2>Before you start</h2>
    <p class="start-text">
      Each circle shows how much you agree or disagree with the question. Choose the color that matches your answer.
    </p>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-circle sd"></div>
        <span><strong>Strongly Disagree</strong> — Red</span>
      </div>
      <div class="legend-item">
        <div class="legend-circle d"></div>
        <span><strong>Disagree</strong> — Orange</span>
      </div>
      <div class="legend-item">
        <div class="legend-circle n"></div>
        <span><strong>Neutral</strong> — Gray</span>
      </div>
      <div class="legend-item">
        <div class="legend-circle a"></div>
        <span><strong>Agree</strong> — Light Green</span>
      </div>
      <div class="legend-item">
        <div class="legend-circle sa"></div>
        <span><strong>Strongly Agree</strong> — Green</span>
      </div>
    </div>

    <button onclick="startQuiz()">Start</button>
  </div>

  <div id="quizScreen" class="hidden">
    <div class="header">
      <span id="step">Step 1 of 8</span>
      <span id="percent">0%</span>
    </div>

    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <div class="screen question-card">
      <h3 id="question"></h3>

      <div class="answers">
        <div class="circle" onclick="answer(1)"></div>
        <div class="circle" onclick="answer(2)"></div>
        <div class="circle" onclick="answer(3)"></div>
        <div class="circle" onclick="answer(4)"></div>
        <div class="circle" onclick="answer(5)"></div>
      </div>

      <div class="labels">
        <span>Strongly Disagree</span>
        <span>Strongly Agree</span>
      </div>
    </div>
  </div>

  <div id="result"></div>
</div>

<script>
const questions = [
"Do you smoke cigarettes or use nicotine products regularly?",
"Do you feel the urge to smoke when you haven’t smoked for a while?",
"Have you ever tried to quit smoking but couldn’t?",
"Do you smoke shortly after waking up?",
"Do you smoke more when you feel stressed, anxious, or upset?",
"Can you go several days without smoking and not feel uncomfortable?",
"Do you find it hard to resist smoking when others around you are smoking?",
"Do you feel irritable or uncomfortable when you don’t smoke?"
];

let current = 0;
let scores = [];

function startQuiz() {
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  loadQuestion();
}

function loadQuestion() {
  document.getElementById("question").innerText = questions[current];

  document.getElementById("step").innerText = 
    `Step ${current + 1} of ${questions.length}`;

  let percent = Math.round((current / questions.length) * 100);
  document.getElementById("percent").innerText = percent + "%";
  document.getElementById("progress").style.width = percent + "%";
}

function answer(value) {
  scores.push(value);
  current++;

  if (current < questions.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  let total = scores.reduce((a, b) => a + b, 0);

  let result = "";
  let advice = "";

  if (total <= 16) {
    result = "Non-smoker";
    advice = `Keep choosing not to smoke and stay confident in your decision. Avoid situations where you feel pressured, and remember that saying “no” protects your health, your lungs, and your future. Staying smoke-free also helps you maintain better fitness, skin health, and overall well-being.`;
  } 
  else if (total <= 28) {
    result = "Occasional smoker";
    advice = `Stop smoking now before it becomes a regular habit. Even occasional smoking can harm your body and increase the risk of addiction. Try to identify what triggers you (stress, friends, boredom) and replace smoking with healthier alternatives like exercise, hobbies, or relaxation techniques.`;
  } 
  else {
    result = "Heavy smoker (addicted)";
    advice = `Make a clear plan to quit smoking. Set a quit date, reduce triggers, and consider using support systems such as counseling or nicotine replacement therapies (like patches or gum). Withdrawal symptoms and cravings are normal, but they pass with time. Stay committed, track your progress, and don’t give up—even if you relapse, you can always try again.`;
  }

  document.getElementById("quizScreen").style.display = "none";

  document.getElementById("result").innerHTML = `
    <div class="screen result-box">
      <h2>Your Result</h2>
      <div class="result-text">${result}</div>
      <p style="margin-top:15px; line-height:1.6; color:#444;">${advice}</p>
      <button onclick="location.reload()">Restart</button>
    </div>
  `;
}
</script>

</body>
</html>
