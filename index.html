<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smoking Assessment</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  text-align: center;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h2 {
  margin-top: 20px;
  color: #333;
}

.card {
  background: white;
  padding: 20px;
  margin: 20px 0;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.options {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
}

.circle {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid #ccc;
  cursor: pointer;
  transition: 0.2s;
}

.circle:hover {
  transform: scale(1.1);
}

.selected {
  background-color: #4CAF50;
  border-color: #4CAF50;
}

.labels {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-top: 5px;
  color: #666;
}

button {
  padding: 15px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #4CAF50;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #45a049;
}

#result {
  font-size: 22px;
  font-weight: bold;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Smoking Behavior Test</h2>
  <p>Choose how accurately each statement reflects you</p>

  <div id="quiz"></div>

  <button onclick="calculate()">See Result</button>

  <div id="result"></div>
</div>

<script>
const questions = [
"Do you smoke cigarettes or use nicotine products regularly?",
"Do you feel the urge to smoke when you haven’t smoked for a while?",
"Have you ever tried to quit smoking but couldn’t?",
"Do you smoke shortly after waking up?",
"Do you smoke more when you feel stressed, anxious, or upset?",
"Can you go several days without smoking and not feel uncomfortable?",
"Do you find it hard to resist smoking when others around you are smoking?",
"Do you feel irritable or uncomfortable when you don’t smoke?"
];

let answers = new Array(questions.length).fill(null);

const quiz = document.getElementById("quiz");

questions.forEach((q, index) => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <p>${q}</p>
    <div class="options">
      ${[1,2,3,4,5].map(num => 
        `<div class="circle" onclick="select(${index}, ${num}, this)"></div>`
      ).join("")}
    </div>
    <div class="labels">
      <span>Strongly Disagree</span>
      <span>Strongly Agree</span>
    </div>
  `;

  quiz.appendChild(card);
});

function select(questionIndex, value, element) {
  answers[questionIndex] = value;

  const siblings = element.parentElement.children;
  for (let el of siblings) el.classList.remove("selected");

  element.classList.add("selected");
}

function calculate() {
  if (answers.includes(null)) {
    alert("Please answer all questions");
    return;
  }

  let score = answers.reduce((a, b) => a + b, 0);

  let result = "";

  if (score <= 16) {
    result = "Non-smoker";
  } else if (score <= 28) {
    result = "Occasional smoker";
  } else {
    result = "Heavy smoker (addicted)";
  }

  document.getElementById("result").innerText = result;
}
</script>

</body>
</html>
